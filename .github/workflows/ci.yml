name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      PANTS_CONCURRENT: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-mod-

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v10
        with:
          named-caches-hash: ${{ hashFiles('go.sum') }}

      - name: Run tests
        run: |
          pants test ::

      - name: Build binary
        run: |
          pants package cmd/avengine:
